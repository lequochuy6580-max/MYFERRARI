<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Ferrari</title>
  
  <!-- Google OAuth SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- Facebook SDK -->
  <script async defer crossorigin="anonymous" 
    src="https://connect.facebook.net/vi_VN/sdk.js#xfbml=1&version=v18.0&appId=YOUR_FACEBOOK_APP_ID" 
    nonce="fb_nonce"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, red 0%, black 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-container {
      background: linear-gradient(120deg,red 0%,black 100%);
      border-radius: 10px;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      color: linear-gradient(10deg, red 0%, yellow 100%);
      font-size: 28px;
      margin-bottom: 10px;
    }

    .auth-header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: bold;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
      margin-top: 10px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .social-section {
      margin: 30px 0;
      position: relative;
    }

    .divider {
      text-align: center;
      font-size: 14px;
      color: #999;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 30%;
      height: 1px;
      background: #e0e0e0;
    }

    .divider::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      width: 30%;
      height: 1px;
      background: #e0e0e0;
    }

    .social-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .social-btn {
      padding: 10px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .social-btn:hover {
      border-color: #667eea;
      background: #f5f5f5;
    }

    .google-btn {
      color: #d32f2f;
    }

    .facebook-btn {
      color: #1877f2;
    }

    .github-btn {
      color: #333;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    .auth-footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }

    .field-error {
      color: #c33;
      font-size: 12px;
      margin-top: 3px;
      display: none;
    }

    .login-error {
      color: #c33;
      font-size: 12px;
      margin-top: 3px;
      display: none;
    }

    .signup-error {
      color: #c33;
      font-size: 12px;
      margin-top: 3px;
      display: none;
    }

    .form-group.error input {
      border-color: #c33;
    }

    .toggle-form {
      display: none;
    }

    .toggle-form.active {
      display: block;
    }

    @media (max-width: 600px) {
      .auth-container {
        padding: 25px;
      }

      .social-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <!-- Đăng nhập -->
    <div id="loginForm" class="toggle-form active">
      <div class="auth-header">
        <h1>My Ferrari</h1>
        <p>Đăng nhập vào tài khoản của bạn</p>
      </div>

      <div id="loginError" class="error-message"></div>
      <div id="loginSuccess" class="success-message"></div>

      <form onsubmit="handleLoginFormSubmit(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" required>
          <div class="field-error login-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
          <div class="field-error login-error" id="passwordError"></div>
        </div>

        <button type="submit" class="submit-btn">Đăng nhập</button>
      </form>

      <div class="social-section">
        <div class="divider">hoặc</div>
        <div class="social-buttons">
          <button type="button" class="social-btn google-btn" onclick="googleSignIn()" title="Đăng nhập với Google">
            <span style="font-size: 18px;">🔐</span> Google
          </button>
          <button type="button" class="social-btn facebook-btn" onclick="facebookSignIn()" title="Đăng nhập với Facebook">
            <span style="font-size: 18px;">📘</span> Facebook
          </button>
          <button type="button" class="social-btn github-btn" onclick="githubSignIn()" title="Đăng nhập với GitHub">
            <span style="font-size: 18px;">🐙</span> GitHub
          </button>
        </div>
        <div id="googleSignInButton" style="display:none; margin-top: 10px;"></div>
      </div>

      <div class="auth-footer">
        Chưa có tài khoản? <a onclick="switchToSignup()">Đăng ký ngay</a>
      </div>
    </div>

    <!-- Đăng ký -->
    <div id="signupForm" class="toggle-form">
      <div class="auth-header">
        <h1>My Ferrari</h1>
        <p>Tạo tài khoản mới</p>
      </div>

      <div id="signupError" class="error-message"></div>
      <div id="signupSuccess" class="success-message"></div>

      <form onsubmit="handleSignupFormSubmit(event)">
        <div class="form-group">
          <label>Họ và tên</label>
          <input type="text" id="signupName" placeholder="Nguyễn Văn A" required>
          <div class="field-error signup-error" id="nameError"></div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="your@email.com" required>
          <div class="field-error signup-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="signupPassword" placeholder="••••••••" minlength="6" required>
          <div class="field-error signup-error" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label>Xác nhận mật khẩu</label>
          <input type="password" id="signupConfirmPassword" placeholder="••••••••" required>
          <div class="field-error signup-error" id="confirmPasswordError"></div>
        </div>

        <button type="submit" class="submit-btn">Đăng ký</button>
      </form>

      <div class="auth-footer">
        Đã có tài khoản? <a onclick="switchToLogin()">Đăng nhập</a>
      </div>
    </div>
  </div>

  <script src="../dist/auth.js"></script>
  <script src="../dist/socialAuth.js"></script>
  <script src="../dist/login.js"></script>
  <script src="../dist/signup.js"></script>
  <script>
    // Toggle between login and signup
    function switchToLogin() {
      document.getElementById("loginForm").classList.add("active");
      document.getElementById("signupForm").classList.remove("active");
      document.getElementById("loginError").style.display = "none";
      document.getElementById("loginSuccess").style.display = "none";
    }

    function switchToSignup() {
      document.getElementById("signupForm").classList.add("active");
      document.getElementById("loginForm").classList.remove("active");
      document.getElementById("signupError").style.display = "none";
      document.getElementById("signupSuccess").style.display = "none";
    }

    // Initialize OAuth (called on page load)
    document.addEventListener('DOMContentLoaded', function() {
      // Check OAuth status
      if (window.socialAuth) {
        const status = window.socialAuth.getOAuthStatus();
        console.log('OAuth Status:', status);
        
        // Handle OAuth callback if needed
        if (window.location.search.includes('code=')) {
          window.socialAuth.handleOAuthCallback();
        }
      }
    });
  </script>
</body>
</html>
