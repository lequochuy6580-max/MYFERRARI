<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Bài Viết - Ferrari Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .article-header {
            background-color: #2a2a2a;
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 10px;
        }

        .article-header h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #dc143c;
        }

        .article-header-meta {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            font-size: 1em;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meta-label {
            color: #999;
        }

        .meta-value {
            color: #dc143c;
            font-weight: bold;
        }

        .article-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(220, 20, 60, 0.3);
        }

        .article-body {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            line-height: 1.8;
            font-size: 1.05em;
        }

        .article-body p {
            margin-bottom: 20px;
            text-align: justify;
        }

        .article-body p:first-letter {
            font-size: 1.1em;
            font-weight: bold;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #dc143c;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
            margin-bottom: 30px;
        }

        .back-btn:hover {
            background-color: #b91230;
        }

        .related-articles {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 2px solid #eee;
        }

        .related-articles h2 {
            color: #dc143c;
            margin-bottom: 30px;
            font-size: 1.8em;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .related-card {
            background-color: #f8f8f8;
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid #dc143c;
        }

        .related-card:hover {
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.2);
            transform: translateX(5px);
        }

        .related-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .related-card p {
            color: #666;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #dc143c;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: center;
        }

        @media (max-width: 768px) {
            .article-header h1 {
                font-size: 1.8em;
            }

            .article-body {
                padding: 20px;
            }

            .article-header-meta {
                gap: 15px;
            }

            .meta-item {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->


    <div class="container">
        <button class="back-btn" onclick="window.history.back();">
            ← Quay Lại
        </button>

        <div id="article-container" class="loading">
            Đang tải bài viết...
        </div>
    </div>

    <!-- Footer -->
    <footer id="footer-container"></footer>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/blogdetail.js"></script>
</body>
</html>
