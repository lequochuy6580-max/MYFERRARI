<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Ferrari E-Shop</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h1>MY FERRARI</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="giohang.html">Cart</a>
    <a href="checkout.html">Checkout</a>
    <a href="contact.html">Contact</a>
    <span id="userInfo">
      <a href="login.html">Đăng nhập</a>
    </span>
  </nav>
</header>
  <main id="main-content"></main>
  <div id="footer-placeholder"></div>

  <script src="dist/app.js"></script>
  <script src="dist/auth.js"></script>
  <script>
    // Check if user is logged in
    if (!window.auth || !window.auth.isLoggedIn()) {
      document.getElementById('main-content').innerHTML = '<h3 style="color:#f00;text-align:center;">❌ Vui lòng đăng nhập để tiếp tục</h3>';
      setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    } else {
      window.showCurrentUser();
    }
  </script>
</body>
</html>
