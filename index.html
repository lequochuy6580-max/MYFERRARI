<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferrari</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Slideshow Styles */
    .slideshow-container {
      position: relative;
      max-width: 100%;
      margin: 20px auto;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(255, 0, 0, 0.3);
    }

    .slideshow-image {
      width: 100%;
      height: 600px;
      object-fit: cover;
      display: none;
      animation: fadeIn 0.5s;
    }

    .slideshow-image.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Navigation Buttons */
    .prev, .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(255, 0, 0, 0.7);
      color: white;
      border: none;
      padding: 15px 20px;
      font-size: 24px;
      cursor: pointer;
      border-radius: 5px;
      transition: background-color 0.3s;
      z-index: 10;
    }

    .prev:hover, .next:hover {
      background-color: rgba(200, 0, 0, 1);
    }

    .prev {
      left: 20px;
    }

    .next {
      right: 20px;
    }

    /* Thumbnail Container */
    .thumbnail-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px auto;
      flex-wrap: wrap;
      max-width: 1200px;
      padding: 0 20px;
    }

    .thumbnail {
      width: 120px;
      height: 80px;
      object-fit: cover;
      cursor: pointer;
      border: 3px solid transparent;
      border-radius: 5px;
      transition: all 0.3s;
      opacity: 0.6;
    }

    .thumbnail:hover {
      opacity: 1;
      border-color: #ff0000;
      transform: scale(1.1);
    }

    .thumbnail.active {
      opacity: 1;
      border-color: #ff0000;
    }

    /* Video Section */
    .video {
      max-width: 100%;
      margin: 30px auto;
      text-align: center;
    }

    .video video {
      width: 100%;
      max-width: 1200px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(255, 0, 0, 0.3);
    }

    /* Blog Section Styles */
    .blog-section {
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      padding: 60px 20px;
      margin-top: 40px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .blog-section-header {
      text-align: center;
      margin-bottom: 40px;
      color: white;
    }

    .blog-section-header h2 {
      font-size: 2.5em;
      color: #dc143c;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .blog-section-header p {
      font-size: 1.1em;
      color: #ccc;
      margin-bottom: 20px;
    }

    .view-all-blog {
      display: inline-block;
      background-color: #dc143c;
      color: white;
      padding: 12px 30px;
      border-radius: 25px;
      text-decoration: none;
      transition: all 0.3s ease;
      font-weight: bold;
    }

    .view-all-blog:hover {
      background-color: #b91230;
      transform: translateY(-3px);
      box-shadow: 0 4px 15px rgba(220, 20, 60, 0.4);
    }

    .home-blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .home-blog-card {
      background-color: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(220, 20, 60, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .home-blog-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 25px rgba(220, 20, 60, 0.4);
    }

    .home-blog-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background-color: #f0f0f0;
    }

    .home-blog-content {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .home-blog-category {
      display: inline-block;
      background-color: #dc143c;
      color: white;
      padding: 4px 12px;
      border-radius: 15px;
      font-size: 0.8em;
      margin-bottom: 10px;
      width: fit-content;
    }

    .home-blog-title {
      font-size: 1.15em;
      margin: 10px 0;
      color: #333;
      min-height: 45px;
      font-weight: bold;
    }

    .home-blog-excerpt {
      color: #666;
      line-height: 1.5;
      margin: 10px 0;
      flex-grow: 1;
      min-height: 45px;
      font-size: 0.95em;
    }

    .home-blog-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
      font-size: 0.85em;
      color: #999;
    }

    .home-blog-date {
      color: #dc143c;
      font-weight: bold;
    }

    .read-btn {
      background-color: #dc143c;
      color: white;
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      font-size: 0.85em;
    }

    .read-btn:hover {
      background-color: #b91230;
    }

    .blog-loading {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .blog-loading::after {
      content: '';
      display: inline-block;
      width: 25px;
      height: 25px;
      border: 3px solid #dc143c;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
    }
  </style>
</head>

<script>
  // Slideshow functionality
  let slideIndex = 0;
  const slides = document.querySelectorAll(".slideshow-image");
  const thumbnails = document.querySelectorAll(".thumbnail");

  function showSlides(index) {
    slides.forEach(slide => slide.classList.remove("active"));
    thumbnails.forEach(thumb => thumb.classList.remove("active"));
    
    slides[index].classList.add("active");
    thumbnails[index].classList.add("active");
  }

  function changeSlide(direction) {
    slideIndex += direction;

    if (slideIndex < 0) {
      slideIndex = slides.length - 1;
    } else if (slideIndex >= slides.length) {
      slideIndex = 0;
    }

    showSlides(slideIndex);
  }

  function jumpToSlide(index) {
    slideIndex = index;
    showSlides(slideIndex);
  }

  function autoSlide() {
    changeSlide(1);
  }

  // Auto-advance slideshow every 5 seconds
  setInterval(autoSlide, 5000);

  // Load products
  loadProducts();
  renderFooter();

  // Load blog posts on homepage
  async function loadHomeBlogPosts() {
    const container = document.getElementById('home-blog-container');
    try {
      const response = await fetch('db.json');
      const data = await response.json();
      const articles = data.articles || [];

      // Sắp xếp bài viết theo ngày mới nhất và lấy 3 bài
      const latestArticles = articles
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .slice(0, 3);

      if (latestArticles.length === 0) {
        container.innerHTML = '<div class="blog-loading">Chưa có bài viết nào</div>';
        return;
      }

      container.innerHTML = latestArticles.map(article => `
        <div class="home-blog-card" onclick="goToBlogDetail(${article.id})">
          <img src="${article.image}" alt="${article.title}" class="home-blog-image" onerror="this.src='media/sf90.1.jpg'">
          <div class="home-blog-content">
            <span class="home-blog-category">${article.category}</span>
            <h3 class="home-blog-title">${article.title}</h3>
            <p class="home-blog-excerpt">${article.excerpt}</p>
            <div class="home-blog-footer">
              <span class="home-blog-date">📅 ${formatBlogDate(article.date)}</span>
              <button class="read-btn">Đọc →</button>
            </div>
          </div>
        </div>
      `).join('');
    } catch (error) {
      console.error('Lỗi khi tải bài viết:', error);
      container.innerHTML = '<div class="blog-loading">Lỗi khi tải bài viết</div>';
    }
  }

  function formatBlogDate(dateString) {
    const options = { month: 'short', day: 'numeric', year: 'numeric' };
    return new Date(dateString).toLocaleDateString('vi-VN', options);
  }

  function goToBlogDetail(articleId) {
    window.location.href = `newsdetail.html?id=${articleId}`;
  }

  // Load blog posts when page is ready
  document.addEventListener('DOMContentLoaded', function() {
    loadHomeBlogPosts();
    setTimeout(() => {
      if (window.showCurrentUser) window.showCurrentUser();
    }, 500);
  });
</script>
